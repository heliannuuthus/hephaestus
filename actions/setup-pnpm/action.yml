name: Setup pnpm (Frontend)
description: Setup Node.js with pnpm, dependency cache, eslint and prettier (frontend projects)

inputs:
  workdir:
    description: Working directory
    required: false
    default: "./"
  node-version:
    description: Node.js version
    required: false
    default: "lts/*"
  registry-url:
    description: npm registry URL (set to enable auth via NODE_AUTH_TOKEN)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: ${{ inputs.registry-url || '' }}

    - uses: pnpm/action-setup@v4
      with:
        package_json_file: ${{ inputs.workdir }}package.json

    - name: Get pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      uses: actions/cache/restore@v4
      id: cache-restore
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-store-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: pnpm i --frozen-lockfile

    - name: Save pnpm store cache
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
