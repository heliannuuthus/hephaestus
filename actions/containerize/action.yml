name: Containerize
description: Build and push Docker image to GitHub Container Registry

inputs:
  workdir:
    description: Working directory (Dockerfile location)
    required: false
    default: "./"
  version:
    description: Image version tag
    required: true
  targets:
    description: Build artifact download path
    required: true

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: targets
        path: ${{ inputs.targets }}

    - id: env
      name: Generate tag metadata
      shell: bash
      run: |
        echo "timestamp=$(date +%Y%m%d | cut -c 3-8)" >> "$GITHUB_OUTPUT"
        echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - id: meta
      name: Docker metadata
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=semver,enable=${{ github.ref == format('refs/heads/{0}', 'main') }},pattern=${{ inputs.version }}-${{ steps.env.outputs.timestamp }}rc-${{ steps.env.outputs.short_sha }},value=${{ inputs.version || 'v0.0.1' }}
          type=semver,enable=${{ github.ref != format('refs/heads/{0}', 'main') }},pattern=${{ inputs.version }}-${{ steps.env.outputs.timestamp }}alpha-${{ steps.env.outputs.short_sha }},value=${{ inputs.version || 'v0.0.1' }}

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.workdir }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
