name: Setup Go
description: Setup Go environment with module cache and CI tools

inputs:
  workdir:
    description: Working directory
    required: false
    default: "./"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.workdir }}go.mod
        cache: true
        cache-dependency-path: ${{ inputs.workdir }}go.sum

    - name: Restore CI tools cache
      uses: actions/cache/restore@v4
      id: tools-cache
      with:
        path: |
          ~/go/bin
        key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.mod') }}
        restore-keys: ${{ runner.os }}-go-tools-

    - name: Install CI tools
      if: steps.tools-cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.workdir }}
      run: |
        go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        go install gotest.tools/gotestsum@latest

    - name: Save CI tools cache
      if: steps.tools-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          ~/go/bin
        key: ${{ runner.os }}-go-tools-${{ hashFiles('**/go.mod') }}
