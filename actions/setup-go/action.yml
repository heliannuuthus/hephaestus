name: Setup Go
description: Setup Go environment with module cache and CI tools

inputs:
  workdir:
    description: Working directory
    required: false
    default: "./"
  gosec-version:
    description: gosec version
    required: false
    default: "2.24.7"
  gotestsum-version:
    description: gotestsum version
    required: false
    default: "1.13.0"

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.workdir }}go.mod
        cache: true
        cache-dependency-path: ${{ inputs.workdir }}go.sum

    - name: Install gosec
      shell: bash
      run: |
        GOSEC_VERSION="${{ inputs.gosec-version }}"
        curl -sfL "https://github.com/securego/gosec/releases/download/v${GOSEC_VERSION}/gosec_${GOSEC_VERSION}_linux_amd64.tar.gz" \
          | tar -xz -C /usr/local/bin gosec

    - name: Install gotestsum
      shell: bash
      run: |
        GOTESTSUM_VERSION="${{ inputs.gotestsum-version }}"
        curl -sfL "https://github.com/gotestyourself/gotestsum/releases/download/v${GOTESTSUM_VERSION}/gotestsum_${GOTESTSUM_VERSION}_linux_amd64.tar.gz" \
          | tar -xz -C /usr/local/bin gotestsum
