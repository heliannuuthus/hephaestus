name: CI Node

on:
  workflow_call:
    inputs:
      workdir:
        required: false
        default: "./"
        type: string
        description: Working directory
      node-version:
        required: false
        default: "lts/*"
        type: string
        description: Node.js version
      build:
        required: false
        default: build
        type: string
        description: Build script name
      test:
        required: false
        default: ""
        type: string
        description: Test script name
      registry-url:
        required: false
        default: ""
        type: string
        description: npm registry URL for scoped package auth

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: heliannuuthus/hephaestus/actions/setup-node@main
        with:
          workdir: ${{ inputs.workdir }}
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

  lint:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: heliannuuthus/hephaestus/actions/setup-node@main
        with:
          workdir: ${{ inputs.workdir }}
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
      - name: Lint
        working-directory: ${{ inputs.workdir }}
        run: pnpm lint

  build:
    needs: [lint]
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.version.outputs.project }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: heliannuuthus/hephaestus/actions/setup-node@main
        with:
          workdir: ${{ inputs.workdir }}
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}
      - name: Build
        if: inputs.build != ''
        working-directory: ${{ inputs.workdir }}
        run: pnpm ${{ inputs.build }}
      - name: Test
        if: inputs.test != ''
        working-directory: ${{ inputs.workdir }}
        run: pnpm ${{ inputs.test }}
      - uses: heliannuuthus/hephaestus/actions/version@main
        id: version
        with:
          workdir: ${{ inputs.workdir }}
          lang: node
